<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>rastgeleSiteAc</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 360px;
      background: white;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .image-box {
      width: 100%;
      height: 260px;
      background: linear-gradient(135deg, #dfe9f3, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #555;
      font-weight: bold;
      font-size: 18px;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 25px;
    }

    h1 {
      color: #1e3c72;
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    button {
      padding: 13px 24px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      background: #2a5298;
      transform: scale(1.05);
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="image-box" id="imageBox">
      <img 
        src="herhangi-bir-adam.jpg" 
        alt="Herhangi Bir Adam"
        onerror="resimBulunamadi()"
      >
    </div>

    <div class="card-content">
      <h1>HERHANGi BiR ADAM</h1>

      <p>
       BUTONA BAS VE NE OLDUGUNU GOR
      </p>

      <button onclick="rastgeleSiteAc()">Yeni Sekmede Isinlan</button>

      <div class="hint">
        Her tiklamada farkli bir site açilir.
      </div>
    </div>

  </div>

  <script>
    function resimBulunamadi() {
      const imageBox = document.getElementById("imageBox");
      imageBox.innerHTML = "Resim bulunamadi ??";
    }

    function rastgeleSiteAc() {
      const siteler = [
        "https://neal.fun",
        "https://theuselessweb.com",
        "https://pointerpointer.com",
        "https://findtheinvisiblecow.com",
        "https://hackertyper.net",
        "https://quickdraw.withgoogle.com",
        "https://window-swap.com",
        "https://zoomquilt.org",
        "https://longdogechallenge.com",
        "https://checkboxrace.com",
        "https://papertoilet.com",
        "https://mondrianandme.com",
        "https://stars.chromeexperiments.com",
        "https://earth.google.com/web",
        "windows93.net",
        
  ];
  
  
  
      const rastgeleSayi = Math.floor(Math.random() * siteler.length);
      const secilenSite = siteler[rastgeleSayi];

      window.open(secilenSite, "_blank");
    }
  </script>

</body>
</html>
